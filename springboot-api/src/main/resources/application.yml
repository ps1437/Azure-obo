server:
  port: 8080

app:
  cors:
    allowed-origin: http://localhost:3000

  azure:
    tenant-id: UD
    client-id: CL_ID
    client-secret: C_S

    # This must match your Backend API app registration Application ID URI.
    # Usually: api://<BACKEND_API_CLIENT_ID>
    audience: api://CL_ID

    # Microsoft Graph scope for OBO call.
    # Backend app registration must have Microsoft Graph delegated User.Read permission.
    graph-scope: https://graph.microsoft.com/User.Read
#
#spring:
#  security:
