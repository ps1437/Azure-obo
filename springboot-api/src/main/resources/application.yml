#        jwt:
#          issuer-uri: https://login.microsoftonline.com/UD/v2.0


ado:
  oauth:
    tenant-id: UD
    client-id: CL_ID
    client-secret: C_S
    redirect-uri: http://localhost:8080/api/ado/callback
    frontend-success-url: http://localhost:3000/ado-connected
    organization: spGlobal
    project: rating
    scope: 499b84ac-1321-427f-aa17-267ca6975798/user_impersonation